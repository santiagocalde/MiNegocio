<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1729"/>
      <stop offset="100%" style="stop-color:#0B132B"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14BBA6"/>
      <stop offset="100%" style="stop-color:#0EA896"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="48" height="48" rx="11" fill="url(#bg)"/>

  <!-- Barra teal superior animada -->
  <rect x="9" y="7" width="30" height="3" rx="1.5" fill="url(#teal)">
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Cuerpo ticket / receipt -->
  <rect x="13" y="13" width="22" height="26" rx="3" fill="white" opacity="0.95"/>

  <!-- Líneas de texto simuladas -->
  <rect x="17" y="18" width="14" height="2.5" rx="1.2" fill="#0B132B" opacity="0.22"/>
  <rect x="17" y="23" width="10" height="2.5" rx="1.2" fill="#0B132B" opacity="0.16"/>
  <rect x="17" y="28" width="12" height="2.5" rx="1.2" fill="#0B132B" opacity="0.16"/>

  <!-- Check teal con glow -->
  <circle cx="31" cy="33" r="6" fill="url(#teal)" filter="url(#glow)"/>
  <path d="M28.2 33l2 2 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Zigzag base del ticket -->
  <polyline points="13,39 15.5,37 18,39 20.5,37 23,39 25.5,37 28,39 30.5,37 35,39" stroke="#0B132B" stroke-width="2.8" fill="none" stroke-linecap="round"/>
</svg>
