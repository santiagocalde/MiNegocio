        <h1>MiNegocio — Sistema de ventas para kioscos de Argentina</h1>
        <p>MiNegocio es el punto de venta (POS) para kioscos, almacenes y minimarkets que <strong>funciona sin internet</strong>. Controlá tu stock, manejá fiados, registrá ventas y cerrá caja en segundos.</p>
        <h2>Características principales</h2>
        <ul>
          <li>Venta offline: seguí cobrando aunque se corte internet</li>
          <li>Control de stock e inventario en tiempo real</li>
          <li>Cuentas corrientes y fiados de clientes</li>
          <li>Cierre de caja y reportes de ventas</li>
          <li>Múltiples operadores con PIN</li>
        </ul>
        <p>Probá gratis 7 días, sin tarjeta de crédito. Para usar el sistema necesitás activar JavaScript en tu navegador.</p>
      </div>
