services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: minegocio
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD no definido en .env}
      POSTGRES_DB: minegocio
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minegocio -d minegocio"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://minegocio:${PG_PASSWORD:?PG_PASSWORD no definido en .env}@db:5432/minegocio
      - PG_HOST=db
      - PG_PORT=5432
      - PG_USER=minegocio
      - PG_PASSWORD=${PG_PASSWORD:?PG_PASSWORD no definido en .env}
      - PG_DATABASE=minegocio
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET no definido en .env}
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN:-}
      - MP_COLLECTOR_ID=${MP_COLLECTOR_ID:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - AI_INVOICE_API_KEY=${AI_INVOICE_API_KEY:-}
      - AI_INVOICE_BASE_URL=${AI_INVOICE_BASE_URL:-}
      - AI_INVOICE_MODEL=${AI_INVOICE_MODEL:-}
      - AI_INVOICE_TEXT_MODEL=${AI_INVOICE_TEXT_MODEL:-}
      - APP_ENV=${APP_ENV:-production}
      - SAAS_MODE=true
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/api/health', timeout=4).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      # localhost resuelve a IPv6 (::1) y nginx escucha en IPv4; usar 127.0.0.1.
      # El :80 hace 301 a HTTPS con cert self-signed → --no-check-certificate.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--no-check-certificate", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
